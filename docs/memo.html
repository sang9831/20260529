<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width,initial-scale=1" />
    <meta property="og:title" content="Memo Flow - 간편한 반응형 메모장" />
    <meta
      property="og:description"
      content="생각이 떠오르는 순간, 쉽고 빠르게 메모를 기록하고 복사해보세요. 부드러운 애니메이션과 감각적인 UI를 제공합니다."
    />
    <meta property="og:type" content="website" />
    <meta property="og:image" content="./og/og-image.png" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <link rel="icon" href="og/favicon.png" />
    <title>메모하기</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --brand-primary: #356173;
        --brand-surface: rgba(255, 255, 255, 0.74);
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        min-height: 100%;
        background:
          radial-gradient(
            circle at top left,
            rgba(185, 230, 251, 0.92),
            transparent 35%
          ),
          radial-gradient(
            circle at bottom right,
            rgba(181, 186, 255, 0.45),
            transparent 32%
          ),
          linear-gradient(135deg, #f5f6ff 0%, #edf0ff 42%, #e0e8ff 100%);
        background-attachment: fixed;
        background-repeat: no-repeat;
        background-size: cover;
      }
      body {
        margin: 0;
        min-height: 100%;
        font-family: "Inter", sans-serif;
        color: var(--brand-primary);
        overflow-x: hidden;
      }
      body::before,
      body::after {
        content: "";
        position: fixed;
        border-radius: 999px;
        pointer-events: none;
        filter: blur(30px);
        opacity: 0.5;
      }
      body::before {
        width: 280px;
        height: 280px;
        top: -96px;
        right: -76px;
        background: rgba(185, 230, 251, 0.36);
      }
      body::after {
        width: 230px;
        height: 230px;
        left: -56px;
        bottom: -72px;
        background: rgba(217, 249, 223, 0.42);
      }
      textarea {
        resize: none;
      }
      #page {
        min-height: 100%;
        min-height: 100dvh;
        padding: 2rem 1rem 3rem;
      }
      #container {
        width: 100%;
        max-width: 1200px;
        position: relative;
        z-index: 1;
      }
      .hero-shell {
        width: 100%;
        max-width: 760px;
        margin-inline: auto;
        padding: 2rem 1.25rem;
        border-radius: 2rem;
        background: var(--brand-surface);
        border: 1px solid rgba(71, 118, 198, 0.18);
        box-shadow: 0 24px 60px rgba(44, 94, 173, 0.12);
        backdrop-filter: blur(18px);
      }
      .hero-shell h1 {
        letter-spacing: -0.04em;
      }
      #memoWriter {
        max-width: 760px;
      }
      #memoWriter textarea {
        min-height: 180px;
      }
      #memoList {
        max-width: 1200px;
      }
      #memoList .memo-card {
        position: relative;
        flex: 1 1 260px;
        min-width: 260px;
        min-height: 220px;
        padding: 1rem 1rem 4.1rem !important;
        border: 1px solid rgba(53, 97, 115, 0.12);
        border-radius: 1.5rem;
        background: linear-gradient(
          180deg,
          rgba(255, 255, 255, 0.96),
          rgba(245, 248, 255, 0.92)
        );
        box-shadow:
          0 18px 40px rgba(44, 94, 173, 0.1),
          inset 0 0 0 1px rgba(71, 118, 198, 0.14);
        color: #244554;
        font-size: 1.02rem;
        line-height: 1.7;
        white-space: pre-wrap;
        word-break: break-word;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease,
          border-color 0.2s ease;
      }
      #memoList .memo-card:hover {
        transform: translateY(-4px);
        border-color: rgba(53, 97, 115, 0.22);
        box-shadow: 0 22px 48px rgba(44, 94, 173, 0.15);
      }
      #memoList .memo-text {
        flex-grow: 1;
        padding: 1rem 1rem 1.1rem;
        margin-bottom: 0.75rem;
        border: 1px solid rgba(71, 118, 198, 0.14);
        border-radius: 1.1rem;
        background: rgba(255, 255, 255, 0.72);
        color: #244554;
        font-size: 1.02rem;
        line-height: 1.75;
        white-space: pre-wrap;
        word-break: break-word;
        box-shadow: inset 0 0 0 1px rgba(191, 226, 255, 0.34);
      }
      #memoList .memo-actions {
        position: absolute;
        left: 1rem;
        right: 1rem;
        bottom: 1rem;
        display: block;
        height: 2.75rem;
      }
      #memoList .memo-actions > button {
        position: absolute;
        bottom: 0;
        flex: 0 0 6.8rem;
        width: 6.8rem;
        border-width: 1px;
        padding: 0.72rem 0.9rem;
        font-weight: 700;
        letter-spacing: -0.01em;
        transition:
          transform 0.2s ease,
          box-shadow 0.2s ease,
          background-color 0.2s ease,
          color 0.2s ease,
          border-color 0.2s ease;
      }
      #memoList .memo-actions > button:hover {
        transform: translateY(-1px);
      }
      #memoList .memo-copy-btn {
        left: 0;
        background: rgba(255, 255, 255, 0.96);
        color: #114353;
        border-color: rgba(53, 97, 115, 0.18);
        box-shadow: 0 10px 20px rgba(53, 97, 115, 0.08);
      }
      #memoList .memo-copy-btn:hover {
        background: linear-gradient(135deg, #b9e6fb, #d9f9df);
        border-color: rgba(53, 97, 115, 0.28);
        color: #0f3b4c;
      }
      #memoList .memo-delete-btn {
        right: 0;
        background: rgba(255, 255, 255, 0.96);
        color: #b31b25;
        border-color: rgba(179, 27, 37, 0.22);
        box-shadow: 0 10px 20px rgba(179, 27, 37, 0.08);
      }
      #memoList .memo-delete-btn:hover {
        background: rgba(255, 239, 238, 0.98);
        border-color: rgba(179, 27, 37, 0.34);
        color: #9f0519;
      }
      .hvr-grow {
        display: inline-block;
        vertical-align: middle;
        transform: perspective(1px) translateZ(0);
        transition-duration: 0.3s;
        transition-property: transform;
      }
      .hvr-grow:hover,
      .hvr-grow:focus,
      .hvr-grow:active {
        transform: scale(1.05);
      }
      @keyframes scale-in-center {
        0% {
          transform: scale(0);
          opacity: 1;
        }
        100% {
          transform: scale(1);
          opacity: 1;
        }
      }
      @keyframes scale-out-center {
        0% {
          transform: scale(1);
          opacity: 1;
        }
        100% {
          transform: scale(0);
          opacity: 1;
        }
      }
      .scale-in-center {
        animation: scale-in-center 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94)
          both;
      }
      .scale-out-center {
        animation: scale-out-center 0.5s cubic-bezier(0.55, 0.085, 0.68, 0.53)
          both;
      }
      .slide-in {
        animation: change 0.5s ease forwards;
      }
      .fade-out {
        animation: fade-out 0.5s ease forwards;
      }
      .fade-in {
        animation: fade-in 0.5s ease forwards;
      }
      @keyframes change {
        from {
          transform: translateX(-100%);
          visibility: visible;
        }
        to {
          transform: translateX(0%);
        }
      }
      @keyframes fade-out {
        from {
          opacity: 1;
        }
        to {
          opacity: 0;
        }
      }
      @keyframes fade-in {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
    </style>
    <script defer="defer" src="./bundle.58a55ad4c9f091800f6b.js"></script>
  </head>
  <body>
    <section id="page" class="d-flex align-items-center justify-content-center">
      <section
        id="container"
        class="d-flex flex-column align-items-center gap-4 justify-content-center box"
      >
        <div class="hero-shell text-center">
          <span
            class="badge rounded-pill bg-primary-subtle text-primary border border-primary-subtle px-3 py-2 shadow-sm"
            >MEMO STUDIO</span
          >
          <h1 class="display-5 fw-bold mt-3 mb-2">메모하기</h1>
        </div>
        <a
          href="index.html"
          class="btn btn-outline-primary rounded-pill px-4 py-2 shadow-sm hvr-grow"
          >메인으로 가기</a
        >
        <form
          id="memoWriter"
          class="card border-0 rounded-4 shadow-sm p-3 p-md-4 w-100"
        >
          <div class="form-floating">
            <textarea
              id="memoText"
              name="memo"
              required
              class="form-control rounded-4 border-primary-subtle"
              placeholder="메모를 입력하세요"
            ></textarea>
            <label for="memoText">메모를 입력하세요</label>
          </div>
          <div class="d-flex flex-wrap justify-content-end gap-2 mt-3">
            <button
              class="btn btn-primary rounded-pill px-4 py-2 shadow-sm hvr-grow"
            >
              작성
            </button>
            <button
              id="resetBtn"
              type="button"
              class="btn btn-outline-secondary rounded-pill px-4 py-2 hvr-grow"
            >
              리셋
            </button>
          </div>
        </form>
        <section
          id="memoList"
          class="d-flex flex-wrap justify-content-center gap-3 w-100"
        ></section>
      </section>
    </section>
  </body>
</html>
