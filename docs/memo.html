<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>메모를 하기</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <style>
      :root {
        --brand-primary: #356173;
        --brand-surface: rgba(255, 255, 255, 0.74);
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Inter", sans-serif;
        color: var(--brand-primary);
        background:
          radial-gradient(
            circle at top left,
            rgba(185, 230, 251, 0.92),
            transparent 35%
          ),
          radial-gradient(
            circle at bottom right,
            rgba(181, 186, 255, 0.45),
            transparent 32%
          ),
          linear-gradient(135deg, #f5f6ff 0%, #edf0ff 42%, #e0e8ff 100%);
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        border-radius: 999px;
        pointer-events: none;
        filter: blur(30px);
        opacity: 0.5;
      }

      body::before {
        width: 280px;
        height: 280px;
        top: -96px;
        right: -76px;
        background: rgba(185, 230, 251, 0.36);
      }

      body::after {
        width: 230px;
        height: 230px;
        left: -56px;
        bottom: -72px;
        background: rgba(217, 249, 223, 0.42);
      }

      textarea {
        resize: none;
      }

      #page {
        min-height: 100vh;
        padding: 2rem 1rem 3rem;
      }

      #container {
        width: 100%;
        max-width: 1200px;
        position: relative;
        z-index: 1;
      }

      .hero-shell {
        width: 100%;
        max-width: 760px;
        margin-inline: auto;
        padding: 2rem 1.25rem;
        border-radius: 2rem;
        background: var(--brand-surface);
        border: 1px solid rgba(71, 118, 198, 0.18);
        box-shadow: 0 24px 60px rgba(44, 94, 173, 0.12);
        backdrop-filter: blur(18px);
      }

      .hero-shell h1 {
        letter-spacing: -0.04em;
      }

      #memoWriter {
        max-width: 760px;
      }

      #memoWriter textarea {
        min-height: 180px;
      }

      #memoList {
        max-width: 1200px;
      }

      #memoList .memo-card {
        flex: 1 1 260px;
        min-width: 260px;
        min-height: 180px;
        white-space: pre-wrap;
        word-break: break-word;
      }

      .hvr-grow {
        display: inline-block;
        vertical-align: middle;
        -webkit-transform: perspective(1px) translateZ(0);
        transform: perspective(1px) translateZ(0);
        box-shadow: 0 0 1px rgba(0, 0, 0, 0);
        -webkit-transition-duration: 0.3s;
        transition-duration: 0.3s;
        -webkit-transition-property: transform;
        transition-property: transform;
      }
      .hvr-grow:hover,
      .hvr-grow:focus,
      .hvr-grow:active {
        transform: scale(1.05);
      }

      /* ----------------------------------------------
 * Generated by Animista on 2026-5-29 17:59:46
 * Licensed under FreeBSD License.
 * See http://animista.net/license for more info. 
 * w: http://animista.net, t: @cssanimista
 * ---------------------------------------------- */

      /**
 * ----------------------------------------
 * animation scale-in-center
 * ----------------------------------------
 */
      @-webkit-keyframes scale-in-center {
        0% {
          -webkit-transform: scale(0);
          transform: scale(0);
          opacity: 1;
        }
        100% {
          -webkit-transform: scale(1);
          transform: scale(1);
          opacity: 1;
        }
      }
      @keyframes scale-in-center {
        0% {
          -webkit-transform: scale(0);
          transform: scale(0);
          opacity: 1;
        }
        100% {
          -webkit-transform: scale(1);
          transform: scale(1);
          opacity: 1;
        }
      }

      /* ----------------------------------------------
 * Generated by Animista on 2026-5-29 18:2:38
 * Licensed under FreeBSD License.
 * See http://animista.net/license for more info. 
 * w: http://animista.net, t: @cssanimista
 * ---------------------------------------------- */

      /**
 * ----------------------------------------
 * animation scale-out-center
 * ----------------------------------------
 */
      @-webkit-keyframes scale-out-center {
        0% {
          -webkit-transform: scale(1);
          transform: scale(1);
          opacity: 1;
        }
        100% {
          -webkit-transform: scale(0);
          transform: scale(0);
          opacity: 1;
        }
      }
      @keyframes scale-out-center {
        0% {
          -webkit-transform: scale(1);
          transform: scale(1);
          opacity: 1;
        }
        100% {
          -webkit-transform: scale(0);
          transform: scale(0);
          opacity: 1;
        }
      }

      .scale-in-center {
        -webkit-animation: scale-in-center 0.5s
          cubic-bezier(0.25, 0.46, 0.45, 0.94) both;
        animation: scale-in-center 0.5s cubic-bezier(0.25, 0.46, 0.45, 0.94)
          both;
      }
      .scale-out-center {
        -webkit-animation: scale-out-center 0.5s
          cubic-bezier(0.55, 0.085, 0.68, 0.53) both;
        animation: scale-out-center 0.5s cubic-bezier(0.55, 0.085, 0.68, 0.53)
          both;
      }

      .slide-in {
        animation: change 0.5s ease forwards;
      }

      .fade-out {
        animation: fade-out 0.5s ease forwards;
      }

      .fade-in {
        animation: fade-in 0.5s ease forwards;
      }

      @keyframes change {
        from {
          transform: translateX(-100%);
          visibility: visible;
        }

        to {
          transform: translateX(0%);
        }
      }

      /* 페이드아웃 애니메이션 */
      @keyframes fade-out {
        from {
          opacity: 1;
        }
        to {
          opacity: 0;
        }
      }

      /* 페이드인 애니메이션 */
      @keyframes fade-in {
        from {
          opacity: 0;
        }
        to {
          opacity: 1;
        }
      }
    </style>
  </head>
  <body>
    <section id="page" class="d-flex align-items-center justify-content-center">
      <section
        id="container"
        class="d-flex flex-column align-items-center gap-4 justify-content-center box"
      >
        <div class="hero-shell text-center">
          <span
            class="badge rounded-pill bg-primary-subtle text-primary border border-primary-subtle px-3 py-2 shadow-sm"
          >
            MEMO STUDIO
          </span>
          <h1 class="display-5 fw-bold mt-3 mb-2">메모를 하기</h1>
        </div>

        <a
          href="index.html"
          class="btn btn-outline-primary rounded-pill px-4 py-2 shadow-sm hvr-grow"
        >
          메인으로 가기
        </a>

        <form
          id="memoWriter"
          class="card border-0 rounded-4 shadow-sm p-3 p-md-4 w-100"
        >
          <div class="form-floating">
            <textarea
              id="memoText"
              name="memo"
              required
              class="form-control rounded-4 border-primary-subtle"
              placeholder="메모를 입력하세요"
            ></textarea>
            <label for="memoText">메모를 입력하세요</label>
          </div>

          <div class="d-flex flex-wrap justify-content-end gap-2 mt-3">
            <button
              class="btn btn-primary rounded-pill px-4 py-2 shadow-sm hvr-grow"
            >
              작성
            </button>
            <button
              id="resetBtn"
              type="button"
              class="btn btn-outline-secondary rounded-pill px-4 py-2 hvr-grow"
            >
              리셋
            </button>
          </div>
        </form>

        <section
          id="memoList"
          class="d-flex flex-wrap justify-content-center gap-3 w-100"
        ></section>
      </section>
    </section>
    <script>
      document.addEventListener("DOMContentLoaded", main);

      // DOM 요소
      const memoWriter = document.querySelector("#memoWriter");
      const memoList = document.querySelector("#memoList");
      const resetBtn = document.querySelector("#resetBtn");

      // 진입점
      function main() {
        console.log("DOM 로딩 완료");
        memoWriter.addEventListener("submit", memoWriterHandler);
        resetBtn.addEventListener("click", () => {
          // localStorage.clear();
          // 현재 출처에 있는 모든 localStorage 데이터 X.
          // localStorage.removeItem("memo");

          // drawPrevMemo();

          if (!confirm("모든 메모를 삭제하시겠습니까?")) return; // 사용자 확인(선택사항)

          const pageSection = document.querySelector("#page");

          // 1. 전체 화면 페이드아웃 시작
          pageSection.classList.remove("fade-in"); // 기존 페이드인 클래스가 있다면 제거
          pageSection.classList.add("fade-out");

          // 2. 페이드아웃 애니메이션이 끝난 후 데이터 처리 및 페이드인
          pageSection.addEventListener(
            "animationend",
            function handleFadeOut() {
              // 로컬스토리지 데이터 삭제 및 화면 갱신
              localStorage.removeItem("memo");
              drawPrevMemo();

              // 페이드아웃 클래스 제거하고 페이드인 클래스 추가
              pageSection.classList.remove("fade-out");
              pageSection.classList.add("fade-in");

              // 이벤트가 중복 실행되지 않도록 한 번만 실행 후 제거
              pageSection.removeEventListener("animationend", handleFadeOut);
            },
            { once: true },
          );
        });
        // 페이지를 표시하자마자
        drawPrevMemo();
      }

      // 1. 별도 함수로 타입추론을 하려면 작성할때에
      // 2. 섞여있는 가운데 아래로 배치
      function memoWriterHandler(event) {
        // form의 기본 이벤트를 금지/방지
        event.preventDefault();
        console.log("form 로직 시작");
        const formData = new FormData(event.target);
        const memoText = formData.get("memo");
        console.log(memoText);

        // 데이터 추가 시 LocalStorage를 사용해서 영속성(persistence)
        const id = saveMemo(memoText);

        // 추가 텍스트
        drawMemoBox(memoText, id);

        // 리셋 (이후 사용 위해 입력 영역 지우기)
        event.target.reset();
      }

      // 특정 텍스트, 특정 리스트에 구현해서 넣겠음
      function drawMemoBox(memoText, id) {
        const memoBox = document.createElement("div");
        memoBox.className =
          "memo-card card border-0 rounded-4 shadow-sm bg-white p-3 d-flex flex-column gap-2 hvr-grow scale-in-center";
        memoBox.textContent = memoText;
        memoList.append(memoBox);
        memoBox.addEventListener(
          "animationend",
          () => {
            memoBox.classList.remove("scale-in-center");
          },
          { once: true },
        );

        // 삭제 로직
        const rmBtn = document.createElement("button");
        rmBtn.textContent = "삭제";
        rmBtn.className =
          "btn btn-sm btn-outline-danger rounded-pill align-self-start hvr-grow";
        // 삭제 버튼은 함수 선언문/표현식에 따라 Lexical Scope로 바뀔 수 있으니 주의
        rmBtn.addEventListener("click", () => {
          // localStorage 지우는게 필요
          const memoObj = getPrevMemo();
          console.log("memoId", id);
          memoObj[id] = undefined; // JSON.stringfy 삭제 시
          localStorage.setItem("memo", JSON.stringify(memoObj));
          // DOM만 지우는 것
          memoBox.classList.add("scale-out-center");
          memoBox.addEventListener(
            "animationend",
            () => {
              memoBox.remove();
            },
            { once: true },
          );
        });

        // 복사 로직
        const cpBtn = document.createElement("button");
        cpBtn.textContent = "복사";
        cpBtn.className =
          "btn btn-sm btn-outline-primary rounded-pill align-self-start hvr-grow";
        cpBtn.addEventListener("click", () => {
          if (confirm("정말 복사하시겠습니까?")) {
            navigator.clipboard.writeText(memoText);
            alert("복사 완료");
          }
        });

        memoBox.append(rmBtn);
        memoBox.append(cpBtn);
      }

      function saveMemo(memoText) {
        // 가장 최근 메모 1개만 저장하겠다
        const memoObj = getPrevMemo();
        // 현재 시간을 숫자로 표시한 값
        const timeKey = Date.now();
        memoObj[timeKey] = memoText;
        console.log(memoObj);
        // localStorage는 문자열 key, value
        // 변수로 된 문자열은 '변환' -> JSON.stringify, parse
        localStorage.setItem("memo", JSON.stringify(memoObj));
        // 생성 후 ID(Key) 값 리턴
        return timeKey;
      }

      // 로직 분리
      function getPrevMemo() {
        const prevMemo = localStorage.getItem("memo") ?? "{}"; // 값이 없으면
        console.log(prevMemo);
        let memoObj;
        try {
          // JSON text -> 객체
          memoObj = JSON.parse(prevMemo);
        } catch (err) {
          console.log(err);
          memoObj = {};
        }
        return memoObj;
      }

      function drawPrevMemo() {
        // localStorage에서 데이터 읽어오기
        const prevMemo = getPrevMemo();
        // timeKey : 메모가 -> 배열
        console.log(prevMemo);
        // 각각 메모 박스 그리기
        memoList.innerHTML = "";
        for (const key in prevMemo) {
          drawMemoBox(prevMemo[key], key);
        }
      }
      window.addEventListener("pageshow", () => {
        document.body.classList.add("slide-in");
      });
    </script>
  </body>
</html>
