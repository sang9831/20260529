<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>메모하러 가기</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH"
      crossorigin="anonymous"
    />
    <link
      rel="stylesheet"
      href="https://cdnjs.cloudflare.com/ajax/libs/animate.css/4.1.1/animate.min.css"
    />
    <style>
      :root {
        --brand-primary: #356173;
      }

      * {
        box-sizing: border-box;
      }

      html,
      body {
        min-height: 100%;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Inter", sans-serif;
        color: var(--brand-primary);
        background:
          radial-gradient(
            circle at top left,
            rgba(185, 230, 251, 0.95),
            transparent 36%
          ),
          radial-gradient(
            circle at bottom right,
            rgba(181, 186, 255, 0.56),
            transparent 32%
          ),
          linear-gradient(135deg, #f5f6ff 0%, #edf0ff 48%, #e0e8ff 100%);
      }

      body::before,
      body::after {
        content: "";
        position: fixed;
        border-radius: 999px;
        pointer-events: none;
        filter: blur(24px);
        opacity: 0.55;
      }

      body::before {
        width: 260px;
        height: 260px;
        top: -72px;
        right: -48px;
        background: rgba(185, 230, 251, 0.35);
      }

      body::after {
        width: 220px;
        height: 220px;
        left: -56px;
        bottom: -48px;
        background: rgba(217, 249, 223, 0.45);
      }

      #container {
        min-height: 100vh;
        max-width: 760px;
        padding: 3rem 1.5rem;
        margin-inline: auto;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 1.25rem;
        text-align: center;
        position: relative;
        z-index: 1;
        backdrop-filter: blur(18px);
      }

      #container::before {
        content: "";
        position: absolute;
        inset: 1.5rem;
        border-radius: 2rem;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(71, 118, 198, 0.18);
        box-shadow: 0 24px 60px rgba(44, 94, 173, 0.14);
        z-index: -1;
      }

      #container h1 {
        letter-spacing: -0.04em;
      }

      #container p {
        max-width: 28rem;
      }

      #container > button {
        min-width: 12rem;
      }

      #container > .badge {
        letter-spacing: 0.08em;
      }
      .hvr-grow {
        display: inline-block;
        vertical-align: middle;
        -webkit-transform: perspective(1px) translateZ(0);
        transform: perspective(1px) translateZ(0);
        box-shadow: 0 0 1px rgba(0, 0, 0, 0);
        -webkit-transition-duration: 0.3s;
        transition-duration: 0.3s;
        -webkit-transition-property: transform;
        transition-property: transform;
      }
      .hvr-grow:hover,
      .hvr-grow:focus,
      .hvr-grow:active {
        transform: scale(1.1);
      }

      /*  */

      .slide-in {
        animation: change 0.5s ease forwards;
      }

      @keyframes change {
        from {
          transform: translateX(100%);
          visibility: visible;
        }

        to {
          transform: translateX(0%);
        }
      }
    </style>
  </head>
  <body class="bg-body-tertiary">
    <div id="container" class="container">
      <span
        class="badge rounded-pill bg-primary-subtle text-primary border border-primary-subtle px-3 py-2 shadow-sm"
      >
        MEMO FLOW
      </span>
      <h1 class="display-5 fw-bold mb-0">메모하러 가기</h1>

      <button
        class="btn btn-primary btn-lg rounded-pill px-4 py-3 shadow-sm hvr-grow"
      >
        이동
      </button>
    </div>
    <script>
      // DOM 로딩이 다 끝난 다음이므로 굳이 DOMContentLoaded X
      document.addEventListener("DOMContentLoaded", main);

      // 호이스팅 되므로 함수 선언문을 뒤에다가 잘 써주시면 된다
      function main() {
        console.log("DOM 로딩 완료");
        const button = document.querySelector("#container > button");
        button.addEventListener("click", () => {
          location.href = "memo.html";
        });
      }

      window.addEventListener("pageshow", () => {
        document.body.classList.add("slide-in");
      });
    </script>
  </body>
</html>
