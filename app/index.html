<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>메모하러 가기</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <style>
      :root {
        --brand-primary: #356173;
      }
      * {
        box-sizing: border-box;
      }
      html,
      body {
        min-height: 100%;
        background:
          radial-gradient(
            circle at top left,
            rgba(185, 230, 251, 0.95),
            transparent 36%
          ),
          radial-gradient(
            circle at bottom right,
            rgba(181, 186, 255, 0.56),
            transparent 32%
          ),
          linear-gradient(135deg, #f5f6ff 0%, #edf0ff 48%, #e0e8ff 100%);
        background-attachment: fixed;
        background-repeat: no-repeat;
        background-size: cover;
      }
      body {
        margin: 0;
        min-height: 100%;
        font-family: "Inter", sans-serif;
        color: var(--brand-primary);
        overflow-x: hidden;
      }
      body::before,
      body::after {
        content: "";
        position: fixed;
        border-radius: 999px;
        pointer-events: none;
        filter: blur(24px);
        opacity: 0.55;
      }
      body::before {
        width: 260px;
        height: 260px;
        top: -72px;
        right: -48px;
        background: rgba(185, 230, 251, 0.35);
      }
      body::after {
        width: 220px;
        height: 220px;
        left: -56px;
        bottom: -48px;
        background: rgba(217, 249, 223, 0.45);
      }
      #container {
        min-height: 100vh;
        max-width: 760px;
        padding: 3rem 1.5rem;
        margin-inline: auto;
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        gap: 1.25rem;
        text-align: center;
        position: relative;
        z-index: 1;
        backdrop-filter: blur(18px);
      }
      #container::before {
        content: "";
        position: absolute;
        inset: 1.5rem;
        border-radius: 2rem;
        background: rgba(255, 255, 255, 0.72);
        border: 1px solid rgba(71, 118, 198, 0.18);
        box-shadow: 0 24px 60px rgba(44, 94, 173, 0.14);
        z-index: -1;
      }
      #container h1 {
        letter-spacing: -0.04em;
      }
      #container p {
        max-width: 28rem;
      }
      #container > button {
        min-width: 12rem;
      }
      #container > .badge {
        letter-spacing: 0.08em;
      }
      .hvr-grow {
        display: inline-block;
        vertical-align: middle;
        transform: perspective(1px) translateZ(0);
        transition-duration: 0.3s;
        transition-property: transform;
      }
      .hvr-grow:hover,
      .hvr-grow:focus,
      .hvr-grow:active {
        transform: scale(1.1);
      }
      .slide-in {
        animation: change 0.5s ease forwards;
      }
      @keyframes change {
        from {
          transform: translateX(100%);
          visibility: visible;
        }
        to {
          transform: translateX(0%);
        }
      }
    </style>
  </head>
  <body>
    <div id="container" class="container">
      <span
        class="badge rounded-pill bg-primary-subtle text-primary border border-primary-subtle px-3 py-2 shadow-sm"
      >
        MEMO FLOW
      </span>
      <h1 class="display-5 fw-bold mb-0">메모하러 가기</h1>
      <button
        class="btn btn-primary btn-lg rounded-pill px-4 py-3 shadow-sm hvr-grow"
      >
        이동
      </button>
    </div>
  </body>
</html>
