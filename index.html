<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>메모하러 가기</title>
    <style>
      * {
        box-sizing: border-box;
      }
      body {
        /* 100vh 설정시 스크롤 생기는 이슈 해결 */
        margin: 0;
        padding: 0;
      }
      #container {
        display: flex;
        flex-direction: column;
        justify-content: center;
        align-items: center;
        height: 100vh;
      }
    </style>
  </head>
  <body>
    <div id="container">
      <h1>메모 하러 가기</h1>
      <button>이동</button>
    </div>
    <script>
      // DOM 로딩이 다 끝난 다음이므로 굳이 DOMContentLoaded X
      document.addEventListener("DOMContentLoaded", main);

      // 호이스팅 되므로 함수 선언문을 뒤에다가 잘 써주시면 된다
      function main() {
        console.log("DOM 로딩 완료");
      }
    </script>
  </body>
</html>
